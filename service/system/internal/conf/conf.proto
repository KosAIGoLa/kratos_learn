syntax = "proto3";
package kratos.api;

option go_package = "system/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Trace trace = 3;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
    string slave_source = 3;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
    string password = 5;
    int32 db = 6;
    google.protobuf.Duration dial_timeout = 7;
  }
  message MongoDB {
    string uri = 1;
    string database = 2;
    string username = 3;
    string password = 4;
    google.protobuf.Duration connect_timeout = 5;
    int32 max_pool_size = 6;
    int32 min_pool_size = 7;
  }
  Database database = 1;
  Redis redis = 2;
  MongoDB mongodb = 3;
}

message Trace {
  string endpoint = 1;
  float sample_rate = 2;
}
