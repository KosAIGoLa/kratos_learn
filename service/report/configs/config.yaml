server:
  http:
    addr: 0.0.0.0:8007
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9007
    timeout: 1s
data:
  database:
    driver: mysql
    source: root:root@tcp(127.0.0.1:3306)/kratos?parseTime=True&loc=Local
    slave_source: ""
  redis:
    network: tcp
    addr: 127.0.0.1:6379
    password: ""
    db: 0
    dial_timeout: 1s
    read_timeout: 0.2s
    write_timeout: 0.2s
registry:
  etcd:
    endpoints:
      - 127.0.0.1:2379
    dial_timeout: 5s
