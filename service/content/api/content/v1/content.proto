syntax = "proto3";

package content.v1;

option go_package = "content/api/content/v1;v1";

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";

service Content {
  rpc ListNews(ListNewsRequest) returns (ListNewsResponse) {
    option (google.api.http) = {
      get: "/api/v1/content/news"
    };
  }
  rpc GetNews(GetNewsRequest) returns (NewsInfo) {
    option (google.api.http) = {
      get: "/api/v1/content/news/{id}"
    };
  }
  rpc CreateNews(CreateNewsRequest) returns (NewsInfo) {
    option (google.api.http) = {
      post: "/api/v1/content/news"
      body: "*"
    };
  }
  rpc UpdateNews(UpdateNewsRequest) returns (NewsInfo) {
    option (google.api.http) = {
      put: "/api/v1/content/news/{id}"
      body: "*"
    };
  }
  rpc DeleteNews(DeleteNewsRequest) returns (DeleteNewsResponse) {
    option (google.api.http) = {
      delete: "/api/v1/content/news/{id}"
    };
  }
  rpc ListBanners(ListBannersRequest) returns (ListBannersResponse) {
    option (google.api.http) = {
      get: "/api/v1/content/banners"
    };
  }
  rpc GetBanner(GetBannerRequest) returns (BannerInfo) {
    option (google.api.http) = {
      get: "/api/v1/content/banners/{id}"
    };
  }
  rpc CreateBanner(CreateBannerRequest) returns (BannerInfo) {
    option (google.api.http) = {
      post: "/api/v1/content/banners"
      body: "*"
    };
  }
  rpc UpdateBanner(UpdateBannerRequest) returns (BannerInfo) {
    option (google.api.http) = {
      put: "/api/v1/content/banners/{id}"
      body: "*"
    };
  }
  rpc DeleteBanner(DeleteBannerRequest) returns (DeleteBannerResponse) {
    option (google.api.http) = {
      delete: "/api/v1/content/banners/{id}"
    };
  }
  rpc RecordClick(RecordClickRequest) returns (RecordClickResponse) {
    option (google.api.http) = {
      post: "/api/v1/content/banners/{banner_id}/click"
      body: "*"
    };
  }

  // 上传图片
  rpc UploadImage(UploadImageRequest) returns (UploadImageResponse) {
    option (google.api.http) = {
      post: "/api/v1/content/upload/image"
      body: "*"
    };
  }
}

message NewsInfo {
  uint32 id = 1;
  string title = 2;
  string summary = 3;
  string content = 4;
  string cover_image = 5;
  string category = 6;
  string type = 7;
  string author = 8;
  uint32 view_count = 9;
  int32 sort = 10;
  int32 status = 11;
  int32 is_top = 12;
  google.protobuf.Timestamp publish_time = 13;
  google.protobuf.Timestamp expire_time = 14;
}

message ListNewsRequest {
  string category = 1;
  string type = 2;
  int32 status = 3;
  uint32 page = 4;
  uint32 page_size = 5;
}

message ListNewsResponse {
  repeated NewsInfo news = 1;
  uint32 total = 2;
}

message GetNewsRequest {
  uint32 id = 1;
}

message CreateNewsRequest {
  string title = 1;
  string summary = 2;
  string content = 3;
  string cover_image = 4;
  string category = 5;
  string type = 6;
  string author = 7;
  uint32 admin_id = 8;
  int32 sort = 9;
  int32 is_top = 10;
  google.protobuf.Timestamp publish_time = 11;
  google.protobuf.Timestamp expire_time = 12;
}

message UpdateNewsRequest {
  uint32 id = 1;
  string title = 2;
  string summary = 3;
  string content = 4;
  string cover_image = 5;
  int32 status = 6;
  int32 is_top = 7;
}

message DeleteNewsRequest {
  uint32 id = 1;
}

message DeleteNewsResponse {
  bool success = 1;
}

message BannerInfo {
  uint32 id = 1;
  string title = 2;
  string image = 3;
  string link = 4;
  string type = 5;
  string position = 6;
  int32 sort = 7;
  int32 status = 8;
  google.protobuf.Timestamp start_time = 9;
  google.protobuf.Timestamp end_time = 10;
  uint32 click_count = 11;
}

message ListBannersRequest {
  string type = 1;
  string position = 2;
  int32 status = 3;
}

message ListBannersResponse {
  repeated BannerInfo banners = 1;
}

message GetBannerRequest {
  uint32 id = 1;
}

message CreateBannerRequest {
  string title = 1;
  string image = 2;
  string link = 3;
  string type = 4;
  string position = 5;
  int32 sort = 6;
  google.protobuf.Timestamp start_time = 7;
  google.protobuf.Timestamp end_time = 8;
}

message UpdateBannerRequest {
  uint32 id = 1;
  string title = 2;
  string image = 3;
  string link = 4;
  int32 sort = 5;
  int32 status = 6;
}

message DeleteBannerRequest {
  uint32 id = 1;
}

message DeleteBannerResponse {
  bool success = 1;
}

message RecordClickRequest {
  uint32 banner_id = 1;
}

message RecordClickResponse {
  bool success = 1;
}

// ============ 图片上传相关消息 ============

message UploadImageRequest {
  // 图片文件内容 (multipart/form-data 会自动处理)
  bytes file = 1;
  // 文件夹类型: banner, news, avatar 等
  string folder = 2;
}

message UploadImageResponse {
  // 上传是否成功
  bool success = 1;
  // 图片访问 URL
  string url = 2;
  // 原文件名
  string original_name = 3;
  // 生成的文件名
  string file_name = 4;
  // 文件大小 (bytes)
  int64 file_size = 5;
  // 错误信息
  string message = 6;
}
