server:
  http:
    addr: 0.0.0.0:8102
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9102
    timeout: 1s
data:
  database:
    driver: mysql
    source: root:aa123123@tcp(127.0.0.1:3306)/msgame?parseTime=True&loc=Local
  redis:
    addr: 127.0.0.1:6379
    read_timeout: 0.2s
    write_timeout: 0.2s
    dial_timeout: 0.2s
    db: 0
    password: ""
  rabbitmq:
    addr: amqp://guest:guest@127.0.0.1:5672/
    exchange: finance.exchange
    queue: withdrawal.queue
    routing_key: withdrawal

registry:
  etcd:
    endpoints:
      - 127.0.0.1:2379
    dial_timeout: 2s

# 链路追踪 (OpenTelemetry)
trace:
  endpoint: http://127.0.0.1:14268/api/traces
  sample_rate: 1.0
