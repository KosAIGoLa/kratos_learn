syntax = "proto3";
package kratos.api;

option go_package = "finance/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Registry registry = 3;
  Trace trace = 4;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
    string slave_source = 3;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
    string password = 5;
    int32 db = 6;
    google.protobuf.Duration dial_timeout = 7;
  }
  message RabbitMQ {
    string addr = 1;        // e.g., "amqp://guest:guest@localhost:5672/"
    string exchange = 2;    // default: "finance.exchange"
    string queue = 3;       // default: "withdrawal.queue"
    string routing_key = 4; // default: "withdrawal"
  }
  Database database = 1;
  Redis redis = 2;
  RabbitMQ rabbitmq = 3;
}

message Registry {
  message Etcd {
    repeated string endpoints = 1;
    google.protobuf.Duration dial_timeout = 2;
  }
  Etcd etcd = 1;
}

message Trace {
  string endpoint = 1;
  float sample_rate = 2;
}
