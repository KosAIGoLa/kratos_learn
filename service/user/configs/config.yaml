server:
  http:
    addr: 0.0.0.0:8107
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9107
    timeout: 1s
data:
  database:
    driver: mysql
    source: root:aa123123@tcp(127.0.0.1:3306)/msgame?parseTime=True&loc=Local
    slave_source: "" # 后续拆读写MySQL服务时填写
  redis:
    addr: 127.0.0.1:6379
    read_timeout: 0.2s
    write_timeout: 0.2s
jwt:
  secret: "your-secret-key-change-in-production"
  access_token_expire: 86400s
  refresh_token_expire: 604800s
registry:
  etcd:
    endpoints:
      - 127.0.0.1:2379
    dial_timeout: 5s

# 链路追踪 (OpenTelemetry)
trace:
  endpoint: http://127.0.0.1:14268/api/traces
  sample_rate: 1.0
