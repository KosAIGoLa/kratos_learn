apiVersion: apps/v1
kind: Deployment
metadata:
  name: cron-service
  namespace: mining-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cron-service
  template:
    metadata:
      labels:
        app: cron-service
    spec:
      containers:
        - name: cron-service
          image: cron-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: "cron"
            - name: SERVICE_VERSION
              value: "v1.0.0"
            - name: CONF
              value: "/app/configs/config.yaml"
          ports:
            - containerPort: 8111
            - containerPort: 9111
          volumeMounts:
            - name: config
              mountPath: /app/configs
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: service-configs
            items:
              - key: cron-config.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: cron-service
  namespace: mining-platform
spec:
  selector:
    app: cron-service
  ports:
    - port: 8111
      targetPort: 8111
      name: http
    - port: 9111
      targetPort: 9111
      name: grpc
