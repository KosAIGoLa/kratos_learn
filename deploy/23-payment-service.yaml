apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: mining-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: "payment"
            - name: SERVICE_VERSION
              value: "v1.0.0"
            - name: CONF
              value: "/app/configs/config.yaml"
          ports:
            - containerPort: 8104
            - containerPort: 9104
          volumeMounts:
            - name: config
              mountPath: /app/configs
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: service-configs
            items:
              - key: payment-config.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: mining-platform
spec:
  selector:
    app: payment-service
  ports:
    - port: 8104
      targetPort: 8104
      name: http
    - port: 9104
      targetPort: 9104
      name: grpc
