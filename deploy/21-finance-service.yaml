apiVersion: apps/v1
kind: Deployment
metadata:
  name: finance-service
  namespace: mining-platform
  labels:
    app: finance-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finance-service
  template:
    metadata:
      labels:
        app: finance-service
    spec:
      containers:
        - name: finance-service
          image: finance-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: SERVICE_NAME
              value: "finance"
            - name: SERVICE_VERSION
              value: "v1.0.0"
            - name: CONF
              value: "/app/configs/config.yaml"
          ports:
            - name: http
              containerPort: 8102
            - name: grpc
              containerPort: 9102
          volumeMounts:
            - name: config
              mountPath: /app/configs
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /q/health
              port: 8102
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health
              port: 8102
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: service-configs
            items:
              - key: finance-config.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: finance-service
  namespace: mining-platform
spec:
  selector:
    app: finance-service
  ports:
    - name: http
      port: 8102
      targetPort: 8102
    - name: grpc
      port: 9102
      targetPort: 9102
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-service-ingress
  namespace: mining-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: finance.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: finance-service
                port:
                  number: 8102
